<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Color Mixing Lab</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    max-width: 1000px;
    width: 100%;
  }

  header {
    text-align: center;
    color: white;
    margin-bottom: 50px;
    animation: slideDown 0.6s ease-out;
  }

  h1 {
    font-size: 3.5em;
    font-weight: 700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 1.1em;
    opacity: 0.95;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  #lab {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 35px;
    margin-bottom: 50px;
    animation: fadeIn 0.8s ease-out 0.2s both;
  }

  .unit {
    text-align: center;
    perspective: 1000px;
  }

  .beaker-container {
    position: relative;
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }

  .beaker {
    width: 130px;
    height: 220px;
    border: 4px solid rgba(255,255,255,0.9);
    border-radius: 15px 15px 8px 8px;
    background: linear-gradient(to right, rgba(255,255,255,0.95), rgba(255,255,255,0.7));
    position: relative;
    overflow: hidden;
    box-shadow: 
      0 10px 30px rgba(0,0,0,0.3),
      inset 0 2px 5px rgba(255,255,255,0.5);
    transition: transform 0.3s ease;
  }

  .beaker:hover {
    transform: translateY(-5px);
  }

  .beaker::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.1) 100%);
    pointer-events: none;
    border-radius: 15px 15px 8px 8px;
  }

  .liquid {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    transition: height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.4s ease;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
  }

  .beaker-label {
    position: absolute;
    bottom: -35px;
    left: 50%;
    transform: translateX(-50%);
    font-weight: 600;
    color: white;
    font-size: 0.95em;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  button {
    padding: 12px 20px;
    cursor: pointer;
    font-size: 15px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pour-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    width: 100%;
  }

  .pour-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  .pour-btn:active {
    transform: scale(0.98);
  }

  .reset-btn {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white;
    width: 100%;
  }

  .reset-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  .reset-btn:active {
    transform: scale(0.98);
  }

  .result-section {
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.2);
    animation: fadeIn 0.8s ease-out 0.4s both;
  }

  .result-header {
    font-size: 1.3em;
    color: #333;
    font-weight: 600;
    margin-bottom: 25px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .result-content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    align-items: center;
  }

  .swatch-display {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
  }

  #swatch {
    width: 100px;
    height: 100px;
    border-radius: 15px;
    border: 4px solid #ddd;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    background: white;
    transition: all 0.4s ease;
  }

  #swatch:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 35px rgba(0,0,0,0.2);
  }

  .color-info {
    text-align: center;
  }

  #resultLabel {
    font-size: 1.5em;
    font-weight: 700;
    color: #667eea;
    margin-bottom: 15px;
    word-break: break-word;
  }

  #poeticLabel {
    font-size: 1.2em;
    color: #764ba2;
    font-style: italic;
    font-weight: 500;
    margin-bottom: 12px;
    opacity: 0.9;
  }

  #pourCount {
    font-size: 0.95em;
    color: #888;
    background: #f5f5f5;
    padding: 12px 16px;
    border-radius: 8px;
    border-left: 4px solid #667eea;
    font-family: 'Monaco', 'Courier New', monospace;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 25px;
  }

  .stat-item {
    background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid #667eea30;
  }

  .stat-label {
    font-size: 0.85em;
    color: #888;
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .stat-value {
    font-size: 1.5em;
    font-weight: 700;
    color: #667eea;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  @media (max-width: 768px) {
    h1 {
      font-size: 2.5em;
    }

    #lab {
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      margin-bottom: 40px;
    }

    .result-content {
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .result-section {
      padding: 30px 20px;
    }
  }

  @media (max-width: 480px) {
    body {
      padding: 20px 15px;
    }

    h1 {
      font-size: 2em;
    }

    #lab {
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .result-section {
      padding: 20px 15px;
    }

    .result-content {
      gap: 15px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🎨 Color Mixing Lab</h1>
    <p class="subtitle">Discover the magic of color combinations</p>
  </header>

  <div id="lab">
    <div class="unit">
      <div class="beaker-container">
        <div class="beaker">
          <div class="liquid" id="liqRed" style="background: linear-gradient(180deg, #ff6b6b 0%, #dc3232 100%); height:100%"></div>
        </div>
        <div class="beaker-label">Red</div>
      </div>
      <button class="pour-btn" onclick="pour('red')">🔴 Pour Red</button>
    </div>

    <div class="unit">
      <div class="beaker-container">
        <div class="beaker">
          <div class="liquid" id="liqBlue" style="background: linear-gradient(180deg, #4c88ff 0%, #3250dc 100%); height:100%"></div>
        </div>
        <div class="beaker-label">Blue</div>
      </div>
      <button class="pour-btn" onclick="pour('blue')">🔵 Pour Blue</button>
    </div>

    <div class="unit">
      <div class="beaker-container">
        <div class="beaker">
          <div class="liquid" id="liqYellow" style="background: linear-gradient(180deg, #ffd93d 0%, #dcc832 100%); height:100%"></div>
        </div>
        <div class="beaker-label">Yellow</div>
      </div>
      <button class="pour-btn" onclick="pour('yellow')">🟡 Pour Yellow</button>
    </div>

    <div class="unit">
      <div class="beaker-container">
        <div class="beaker" id="mixBeaker">
          <div class="liquid" id="mixLiquid"></div>
        </div>
        <div class="beaker-label">Mix</div>
      </div>
      <button class="reset-btn" onclick="resetMix()">✨ Reset</button>
    </div>
  </div>

  <div class="result-section">
    <div class="result-header">Your Creation</div>
    <div class="result-content">
      <div class="swatch-display">
        <div id="swatch"></div>
        <div class="color-info">
          <div id="resultLabel">Start mixing!</div>
          <div id="poeticLabel"></div>
        </div>
      </div>
      <div>
        <div id="pourCount"></div>
        <div class="stats" id="statsContainer"></div>
      </div>
    </div>
  </div>
</div>

<script>
let contents = [];

const PIGMENTS = {
  red:    '#dc3232',
  blue:   '#3250dc',
  yellow: '#dcc832',
};

// ── Core color engine ──────────────────────────────────────────────────────

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max + min) / 2;
  if (max === min) {
    h = s = 0;
  } else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
}

function hexToRgb(hex) {
  const c = hex.replace('#','');
  return [parseInt(c.slice(0,2),16), parseInt(c.slice(2,4),16), parseInt(c.slice(4,6),16)];
}

function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
}

function mixColors(hexA, hexB) {
  const [h1,s1,l1] = rgbToHsl(...hexToRgb(hexA));
  const [h2,s2,l2] = rgbToHsl(...hexToRgb(hexB));
  let dh = h2 - h1;
  if (dh > 180) dh -= 360;
  if (dh < -180) dh += 360;
  const h = (h1 + dh / 2 + 360) % 360;
  const s = (s1 + s2) / 2;
  const l = (l1 + l2) / 2;
  return rgbToHex(...hslToRgb(Math.round(h), Math.round(s), Math.round(l)));
}

// ── Poetic name from HSL ───────────────────────────────────────────────────

function poeticName(hex) {
  const [h, s, l] = rgbToHsl(...hexToRgb(hex));
  if (s < 8)  return l > 70 ? '✨ White Fog' : l < 30 ? '🌑 Deep Shadow' : '⚫ Stone Gray';
  const names = [
    [0,15,'🌹 Rose Blush'],[15,30,'🔥 Ember Red'],[30,45,'🏜️ Burnt Sienna'],
    [45,60,'🌅 Warm Amber'],[60,75,'✨ Golden Hour'],[75,90,'🌿 Olive Dusk'],
    [90,120,'🌱 Spring Leaf'],[120,150,'🌲 Forest Green'],[150,180,'🌊 Ocean Mint'],
    [180,210,'💎 Teal Mist'],[210,240,'🌤️ Sky Cerulean'],[240,270,'💙 Cobalt Blue'],
    [270,300,'👾 Iris Violet'],[300,330,'🌸 Wild Lavender'],[330,360,'🌹 Rose Blush'],
  ];
  const base = (names.find(([lo,hi]) => h >= lo && h < hi) || [])[2] || '🎨 Mixed Hue';
  if (s < 30) return '💫 Muted ' + base.split(' ').slice(1).join(' ');
  if (l > 70) return '☁️ Pale ' + base.split(' ').slice(1).join(' ');
  if (l < 35) return '🌑 Deep ' + base.split(' ').slice(1).join(' ');
  return base;
}

// ── App logic ────────────────────────────────────────────────────────────

function pour(color) {
  contents.push(color);
  updateMix();
}

function updateMix() {
  const mixLiquid = document.getElementById('mixLiquid');
  const swatch    = document.getElementById('swatch');
  const label     = document.getElementById('resultLabel');
  const poetic    = document.getElementById('poeticLabel');
  const pourCount = document.getElementById('pourCount');

  const hex = getMixedColor(contents);

  mixLiquid.style.background = `linear-gradient(135deg, ${hex}dd 0%, ${hex} 100%)`;
  mixLiquid.style.height = Math.min(100, contents.length * 20) + '%';
  swatch.style.background = hex;

  label.textContent = hex.toUpperCase();
  poetic.textContent = poeticName(hex);

  const counts = {};
  contents.forEach(c => counts[c] = (counts[c] || 0) + 1);
  const formula = Object.entries(counts).map(([c,n]) => n + '× ' + c.charAt(0).toUpperCase() + c.slice(1)).join('  +  ');
  pourCount.innerHTML = '<strong>Formula:</strong><br>' + (formula || 'Empty');

  // Update stats
  const [h, s, l] = rgbToHsl(...hexToRgb(hex));
  const statsContainer = document.getElementById('statsContainer');
  statsContainer.innerHTML = `
    <div class="stat-item">
      <div class="stat-label">Hue</div>
      <div class="stat-value">${h}°</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Saturation</div>
      <div class="stat-value">${s}%</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Lightness</div>
      <div class="stat-value">${l}%</div>
    </div>
  `;
}

function getMixedColor(list) {
  if (list.length === 0) return '#ffffff';
  let current = PIGMENTS[list[0]];
  for (let i = 1; i < list.length; i++) {
    current = mixColors(current, PIGMENTS[list[i]]);
  }
  return current;
}

function resetMix() {
  contents = [];
  const mixLiquid = document.getElementById('mixLiquid');
  mixLiquid.style.height = '0%';
  mixLiquid.style.background = 'white';
  document.getElementById('resultLabel').textContent = 'Start mixing!';
  document.getElementById('poeticLabel').textContent = '';
  document.getElementById('pourCount').innerHTML = '<strong>Formula:</strong><br>Empty';
  document.getElementById('statsContainer').innerHTML = `
    <div class="stat-item">
      <div class="stat-label">Hue</div>
      <div class="stat-value">-</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Saturation</div>
      <div class="stat-value">-</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Lightness</div>
      <div class="stat-value">-</div>
    </div>
  `;
}
</script>

</body>
</html>
